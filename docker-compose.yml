services:
  backend-http1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "python scripts/generate_cert.py --common-name=localhost && python server.py --protocol=http1 --host=0.0.0.0 --port=8000"
    ports:
      - "8000:8000/tcp"
    volumes:
      - backend-certs:/app/certs

  backend-http2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "python scripts/generate_cert.py --common-name=localhost && python server.py --protocol=http2 --host=0.0.0.0 --port=8443"
    ports:
      - "8443:8443/tcp"
    volumes:
      - backend-certs:/app/certs

  backend-http3:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "python scripts/generate_cert.py --common-name=localhost && python server.py --protocol=http3 --host=0.0.0.0 --port=8443"
    ports:
      - "8443:8443/udp"
    volumes:
      - backend-certs:/app/certs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend-http1
      - backend-http2
      - backend-http3

volumes:
  backend-certs:

